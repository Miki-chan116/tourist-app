<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>観光地登録</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- ナビバー -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">観光サイト</a>
    </div>
</nav>

<!-- フォーム -->
<div class="container mt-5">
    <h2 class="mb-4 text-center">観光地登録</h2>

    <form method="POST" action="/add">

        <!-- 観光地名 -->
        <div class="mb-3">
            <label class="form-label">観光地名</label>
            <input type="text" name="name" class="form-control" required>
        </div>

        <!-- 説明 -->
        <div class="mb-3">
            <label class="form-label">説明</label>
            <textarea name="description" class="form-control" rows="3"></textarea>
        </div>

        <!-- 住所 -->
        <div class="mb-3">
            <label class="form-label">住所</label>
            <input type="text" name="address" class="form-control">
        </div>

        <!-- 料金 -->
        <div class="mb-3">
            <label class="form-label">料金</label>
            <input type="text" name="price" class="form-control">
        </div>

        <!-- 公式URL -->
        <div class="mb-3">
            <label class="form-label">公式URL</label>
            <input type="url" name="official_url" class="form-control">
        </div>

        <!-- ボタン -->
        <div class="text-center">
            <button type="submit" class="btn btn-primary">登録する</button>
        </div>

    </form>
</div>

</body>
</html>
