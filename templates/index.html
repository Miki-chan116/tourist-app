<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>観光サイト</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- ナビバー -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">観光サイト</a>
        <div class="ms-auto">
            <a href="/add" class="btn btn-primary">＋登録する</a>
        </div>
    </div>
</nav>

<!-- メイン -->
<div class="container mt-4">

    <h1 class="mb-4 text-center">観光地一覧</h1>

    <div class="row">

        <!-- カード① -->
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card mb-4 shadow">
                <img src="https://placehold.jp/300x200.png" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">道後温泉</h5>
                    <p class="card-text">歴史ある温泉地</p>
                </div>
            </div>
        </div>

        <!-- カード② -->
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card mb-4 shadow">
                <img src="https://placehold.jp/300x200.png" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">松山城</h5>
                    <p class="card-text">景色が最高のお城</p>
                </div>
            </div>
        </div>

        <!-- カード③ -->
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card mb-4 shadow">
                <img src="https://placehold.jp/300x200.png" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">しまなみ海道</h5>
                    <p class="card-text">サイクリングに最高のルート</p>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
